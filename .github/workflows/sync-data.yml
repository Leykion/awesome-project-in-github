# 数据同步工作流：定时抓取 GitHub 数据、AI 策展、构建并部署
name: Sync Data & Deploy

on:
  schedule:
    # UTC 00:00 和 12:00 触发
    - cron: '0 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: sync-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    # 兜底超时：日常增量运行应在 10 分钟内完成；候选积压时的全量回填约需 20-30 分钟
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run data pipeline
        run: pnpm pipeline:all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Commit & push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: sync data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Build frontend
        run: pnpm build

      - name: Ensure Cloudflare Pages project exists
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/gitpulse-ai")
          if [ "$STATUS" = "404" ]; then
            echo "Project not found, creating gitpulse-ai..."
            curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"gitpulse-ai","production_branch":"main"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects"
            echo "Project created."
          else
            echo "Project already exists (status=$STATUS)."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: pnpm --filter frontend exec wrangler pages deploy ./dist --project-name=gitpulse-ai --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
